[files]
extend-exclude = [
  "data/*.csv",
  "data/*.tsv",
  "rustfmt.toml",
  "clippy.toml",
  "LICENSE-APACHE",
  ".git",
]
ignore-hidden = false
ignore-files = false
ignore-dot = false
ignore-vcs = true
ignore-global = false
ignore-parent = false

[default]
binary = false
check-filename = true
check-file = true
unicode = true
locale = "en-gb"
extend-ignore-re = [
  "(?m)^.*// ignore-spell$",
  "(?m)^use .*;$",
  "(?m)#\\[derive(.*)]$",
]

[default.extend-identifiers]
color_eyre = "color_eyre"
CARGO_TERM_COLOR = "CARGO_TERM_COLOR"
